{% extends "base.html" %}
{% block title %} · Collector{% endblock %}
{% block content %}
<h1>📡 Collector</h1>
<p class="muted">Registro de datos recibidos en <code>/collect?c=...</code></p>

<div class="panel">
    <h2>Datos recibidos</h2>
    <pre>{{ captured }}</pre>
</div>

{% if success %}
<div class="flag">🏆 {{ flag }}</div>
{% endif %}
{% endblock %}
